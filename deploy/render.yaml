services:
  # Single unified service (frontend + backend in one container)
  - type: web
    name: shikshak
    env: docker
    repo: https://github.com/abnjain/shikshak-recruitment
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/public/jobs
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: shikshak-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: shikshak-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: shikshak-db
          property: databaseName
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: shikshak-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: shikshak-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

databases:
  - name: shikshak-db
    plan: free
    databaseName: shikshak_recruitment
    region: oregon
