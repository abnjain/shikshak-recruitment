apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shikshak-ingress
  namespace: shikshak
  annotations:
    # === For GKE (GCP) ===
    # kubernetes.io/ingress.class: "gce"
    # networking.gke.io/managed-certificates: "shikshak-cert"

    # === For AWS EKS ===
    # kubernetes.io/ingress.class: "alb"
    # alb.ingress.kubernetes.io/scheme: "internet-facing"
    # alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:region:account:certificate/your-cert"

    # === For any nginx ingress controller ===
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - shikshak.abnjain.me
      secretName: shikshak-tls
  rules:
    - host: shikshak.abnjain.me
      http:
        paths:
          # Frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          # Backend API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
